# Example docker-compose.override.yml for self-upgrade deploy key
#
# This file is auto-generated by scripts/setup.sh (Step 4).
# It mounts an SSH deploy key into the container so the bot
# can push code changes to your fork (self-upgrade feature).
#
# Copy this to the project root and adjust the key paths:
#   cp examples/docker-compose.override.yml docker-compose.override.yml
#
# The key must have WRITE access to your fork's repo.
# See scripts/setup.sh for deploy key generation.
#
# IMPORTANT: Mount the .container copy (640 perms, docker group), NOT the
# original key. SSH rejects keys with group-readable perms, so the original
# stays at 600 for host SSH while the .container copy is readable by the
# container's GID 999 (hostdocker group).
#
# IMPORTANT: Use ABSOLUTE paths, not ~/. The deploy watcher runs as botuser,
# so ~ resolves to /home/botuser/ — not the admin user's home where the key
# lives. Using ~ causes Docker to create a directory placeholder instead of
# mounting the file, breaking SSH inside the container.

services:
  bot-core:
    volumes:
      # Git deploy key for self-upgrade push (to your fork)
      # Uses .container copy — see scripts/setup.sh for how this is created
      # Replace /home/youruser with your actual home directory
      - /home/youruser/.ssh/bot_deploy.container:/home/botuser/.ssh/id_ed25519:ro
      - /home/youruser/.ssh/bot_deploy.container.pub:/home/botuser/.ssh/id_ed25519.pub:ro
